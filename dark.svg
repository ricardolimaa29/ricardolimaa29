<svg width="1180" height="610" viewBox="0 0 1180 610" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Ricardo Lima</title>
  <defs>
    <!-- GLOBAIS -->
    <rect id="rect" width="1180" height="610" rx="24"/>
    <clipPath id="clip">
      <use xlink:href="#rect"/>
    </clipPath>

    <!-- GRADIENTES E CORES (DARK MODE) -->
    <linearGradient id="acc_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#22D3EE;#10B981;#7C3AED" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#10B981;#7C3AED;#22D3EE" dur="10s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <linearGradient id="ascii_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#7C3AED"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="0 -1; 0 1; 0 -1" dur="10s" repeatCount="indefinite" />
    </linearGradient>

    <radialGradient id="bg_glow_1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1000 100) scale(400)">
      <stop stop-color="#7C3AED" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="bg_glow_2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(200 500) scale(400)">
      <stop stop-color="#10B981" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>

    <!-- FILTROS -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#22D3EE" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glowBlur"/>
      <feMerge>
        <feMergeNode in="glowBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="blur_panel">
      <feGaussianBlur stdDeviation="20"/>
    </filter>

    <!-- RUIDO / TEXTURA -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.6 0 0 0 0 0.6 0 0 0 0 0.6 0 0 0 0.05 0"/>
    </filter>

    <!-- MÁSCARA DE REVELAÇÃO (ASCII) -->
    <mask id="mask_ascii" maskUnits="userSpaceOnUse">
      <rect x="50" y="80" width="380" height="450" fill="white">
        <animate attributeName="height" from="0" to="450" dur="2s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      </rect>
    </mask>

    <!-- ESTILOS CSS (Apenas para as animações de Hover e Fontes) -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Fira+Code:wght@400&amp;display=swap');
      
      text { font-family: 'Inter', sans-serif; fill: #F8FAFC; }
      .mono { font-family: 'Fira Code', monospace; }
      .muted { fill: #94A3B8; }
      
      /* Hover Skills Pills */
      .skill-pill { transition: all 0.3s ease; cursor: pointer; }
      .skill-pill:hover rect { stroke-width: 1.5; filter: url(#glow_pill); transform: scale(1.05); transform-origin: center; }
      
      /* Hover Social Icons */
      .social-icon { transition: all 0.3s ease; }
      .social-icon:hover { filter: url(#glow); transform: translateY(-2px); }

      /* Filtro de Glow Específico para Pills */
      <filter id="glow_pill">
        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </style>
  </defs>

  <!-- BACKGROUND BASE -->
  <use xlink:href="#rect" fill="#030712"/>
  
  <!-- BACKGROUND ANIMADO -->
  <g clip-path="url(#clip)">
    <use xlink:href="#rect" fill="url(#bg_glow_1)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="8s" repeatCount="indefinite" />
    </use>
    <use xlink:href="#rect" fill="url(#bg_glow_2)">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="10s" repeatCount="indefinite" />
    </use>
    
    <!-- Partículas -->
    <circle cx="200" cy="100" r="1.5" fill="#7C3AED" opacity="0.6">
      <animate attributeName="cy" values="100;500;100" dur="15s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="15s" repeatCount="indefinite" />
    </circle>
    <circle cx="1000" cy="400" r="2" fill="#10B981" opacity="0.5">
      <animate attributeName="cy" values="400;100;400" dur="20s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="20s" repeatCount="indefinite" />
    </circle>
    
    <!-- Noise Overlay -->
    <use xlink:href="#rect" filter="url(#noise)" opacity="0.02"/>
  </g>

  <!-- PAINEL ESQUERDO (ASCII) -->
  <g transform="translate(0, 0)">
    <!-- Glassmorphism Effect -->
    <rect x="30" y="30" width="418" height="550" rx="20" fill="#0F172A" fill-opacity="0.6" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    
    <!-- Floating ASCII Portrait -->
    <g mask="url(#mask_ascii)" filter="url(#glow)">
      <g class="mono" font-size="9" fill="url(#ascii_grad)">
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -10; 0 0" dur="6s" repeatCount="indefinite" ease="easeInOutSine" />
        <text x="70" y="100">      ::::::::::::::::.      </text>
        <text x="70" y="112">   .::::::::::::::::::::.   </text>
        <text x="70" y="124">  :::::::-^''```''^-::::::: </text>
        <text x="70" y="136"> :::::-`             `-:::::</text>
        <text x="70" y="148"> ::::`                 `::::</text>
        <text x="70" y="160"> :::-                   -:::</text>
        <text x="70" y="172"> :::.      RICARDO      .:::</text>
        <text x="70" y="184"> :::.       LIMA        .:::</text>
        <text x="70" y="196"> :::-                   -:::</text>
        <text x="70" y="208"> `:::-                 -:::`</text>
        <text x="70" y="220">  `::::-.           .-::::` </text>
        <text x="70" y="232">    `::::::-_____::::::`    </text>
        <text x="70" y="244">       `::::::::::::::`     </text>
        <text x="70" y="256">          ```....```        </text>
        <!-- Adicionei mais linhas para preencher o terminal cyber -->
        <text x="70" y="280"> &gt; SYSTEM: ONLINE</text>
        <text x="70" y="292"> &gt; STATUS: CODING...</text>
        <text x="70" y="304"> &gt; DEPLOY: SUCCESS</text>
        <text x="70" y="316"> &gt; CORE: [########--]</text>
      </g>
    </g>
    
    <!-- Cursor Blink (ASCII) -->
    <rect x="70" y="325" width="8" height="2" fill="#22D3EE">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" begin="2.5s" />
    </rect>
    
    <!-- Scanline Sweep -->
    <rect x="30" y="30" width="418" height="2" fill="white" opacity="0.03">
      <animate attributeName="y" values="30;580;30" dur="8s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- PAINEL DIREITO (TERMINAL) -->
  <g transform="translate(478, 30)">
    <!-- Glassmorphism Effect -->
    <rect width="672" height="550" rx="20" fill="#0F172A" fill-opacity="0.8" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    
    <!-- Border Shimmer -->
    <rect width="672" height="550" rx="20" stroke="url(#acc_grad)" stroke-width="1.5" stroke-dasharray="100 1000" stroke-dashoffset="0">
        <animate attributeName="stroke-dashoffset" from="0" to="-1100" dur="15s" repeatCount="indefinite" />
    </rect>

    <!-- Header Terminal -->
    <g transform="translate(20, 15)">
      <circle cx="10" cy="10" r="6" fill="#EF4444"/>
      <circle cx="30" cy="10" r="6" fill="#F59E0B"/>
      <circle cx="50" cy="10" r="6" fill="#10B981"/>
      <text x="336" y="15" text-anchor="middle" font-size="12" class="mono muted">ricardolima ~ zsh</text>
    </g>
    
    <g transform="translate(40, 70)">
      <!-- GREETING -->
      <text x="0" y="0" font-size="18" class="mono muted">
        Hi <tspan dy="-2">👋</tspan>
      </text>
      <text x="0" y="35" font-size="36" font-weight="700">I'm Ricardo Lima</text>
      
      <!-- TYPING TEXT (ROLES) -->
      <g transform="translate(0, 75)" class="mono" font-size="20">
        <text x="0" y="0" fill="url(#acc_grad)">
          <tspan>
            <animate attributeName="opacity" values="0;1;1;0" dur="9s" repeatCount="indefinite" begin="0s" keyTimes="0;0.05;0.3;0.33" />
            Software Engineer
          </tspan>
          <tspan x="0" dy="0">
            <animate attributeName="opacity" values="0;0;1;1;0" dur="9s" repeatCount="indefinite" begin="0s" keyTimes="0;0.33;0.38;0.63;0.66" />
            Open Source Contributor
          </tspan>
          <tspan x="0" dy="0">
            <animate attributeName="opacity" values="0;0;1;1;0" dur="9s" repeatCount="indefinite" begin="0s" keyTimes="0;0.66;0.71;0.97;1" />
            AI Enthusiast
          </tspan>
        </text>
        <!-- Cursor -->
        <rect x="0" y="-18" width="10" height="22" fill="#F8FAFC">
            <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
            <animateTransform attributeName="transform" type="translate" values="0; 210; 0; 280; 0; 160; 0" dur="9s" repeatCount="indefinite" keyTimes="0; 0.3; 0.33; 0.63; 0.66; 0.97; 1" calcMode="stepped"/>
        </rect>
      </g>

      <!-- SEQUENTIAL REVEAL INFO -->
      <g transform="translate(0, 130)" font-size="14" class="mono muted">
        <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1s" fill="freeze"/><text x="0" y="0">📍 Location:</text><text x="110" y="0" class="muted">Brasil</text></g>
        <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.2s" fill="freeze"/><text x="0" y="25">🎓 Education:</text><text x="110" y="25" class="muted">Análise e Des. de Sistemas</text></g>
        <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.4s" fill="freeze"/><text x="0" y="50">🎯 Focus:</text><text x="110" y="50" class="muted">Full Stack &amp; AI Integration</text></g>
        <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.6s" fill="freeze"/><text x="0" y="75">💼 Portfolio:</text><text x="110" y="75" fill="#22D3EE">ricardolima.dev</text></g>
        <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.8s" fill="freeze"/><text x="0" y="100">📧 Email:</text><text x="110" y="100" fill="#22D3EE">ricardo...@...</text></g>
      </g>

      <!-- SKILLS SECTION -->
      <g transform="translate(0, 260)">
        <text x="0" y="0" font-size="16" font-weight="600" class="mono">Tech Stack</text>
        <g transform="translate(0, 20)">
            <!-- ROW 1 -->
            <g class="skill-pill" transform="translate(0,0)"><rect width="70" height="28" rx="14" fill="#0F172A" stroke="rgba(255,255,255,0.1)"/><text x="35" y="18" text-anchor="middle" font-size="12" class="mono">Python</text></g>
            <g class="skill-pill" transform="translate(80,0)"><rect width="70" height="28" rx="14" fill="#0F172A" stroke="rgba(255,255,255,0.1)"/><text x="35" y="18" text-anchor="middle" font-size="12" class="mono">Node.js</text></g>
            <g class="skill-pill" transform="translate(160,0)"><rect width="90" height="28" rx="14" fill="#0F172A" stroke="rgba(255,255,255,0.1)"/><text x="45" y="18" text-anchor="middle" font-size="12" class="mono">TypeScript</text></g>
            <g class="skill-pill" transform="translate(260,0)"><rect width="80" height="28" rx="14" fill="#0F172A" stroke="rgba(255,255,255,0.1)"/><text x="40" y="18" text-anchor="middle" font-size="12" class="mono">Tailwind</text></g>
            <g class="skill-pill" transform="translate(350,0)"><rect width="70" height="28" rx="14" fill="#0F172A" stroke="rgba(255,255,255,0.1)"/><text x="35" y="18" text-anchor="middle" font-size="12" class="mono">Docker</text></g>
            
            <!-- ROW 2 -->
            <g transform="translate(0, 40)">
              <g class="skill-pill" transform="translate(0,0)"><rect width="80" height="28" rx="14" fill="#0F172A" stroke="rgba(255,255,255,0.1)"/><text x="40" y="18" text-anchor="middle" font-size="12" class="mono">Postgres</text></g>
              <g class="skill-pill" transform="translate(90,0)"><rect width="50" height="28" rx="14" fill="#0F172A" stroke="rgba(255,255,255,0.1)"/><text x="25" y="18" text-anchor="middle" font-size="12" class="mono">Git</text></g>
              <g class="skill-pill" transform="translate(150,0)"><rect width="60" height="28" rx="14" fill="#0F172A" stroke="rgba(255,255,255,0.1)"/><text x="30" y="18" text-anchor="middle" font-size="12" class="mono">Figma</text></g>
              <g class="skill-pill" transform="translate(220,0)"><rect width="60" height="28" rx="14" fill="#0F172A" stroke="rgba(255,255,255,0.1)"/><text x="30" y="18" text-anchor="middle" font-size="12" class="mono">React</text></g>
            </g>
        </g>
      </g>
      
      <!-- SOCIAL ICONS -->
      <g transform="translate(0, 390)">
        <text x="0" y="0" font-size="16" font-weight="600" class="mono">Connect</text>
        <g transform="translate(0, 20)">
            <!-- GitHub -->
            <g class="social-icon" transform="translate(0, 0)">
                <circle cx="20" cy="20" r="20" fill="#1F2937" fill-opacity="0.5" stroke="rgba(255,255,255,0.05)"/>
                <path d="M20 10C14.477 10 10 14.477 10 20C10 24.418 12.865 28.166 16.839 29.489C17.339 29.581 17.521 29.273 17.521 29.007C17.521 28.767 17.512 28.131 17.508 27.286C14.728 27.889 14.141 25.946 14.141 25.946C13.687 24.791 13.031 24.484 13.031 24.484C12.124 23.865 13.099 23.877 13.099 23.877C14.102 23.947 14.629 24.908 14.629 24.908C15.52 26.435 16.966 25.994 17.534 25.739C17.625 25.093 17.884 24.653 18.17 24.403C15.95 24.151 13.616 23.293 13.616 19.467C13.616 18.377 14.005 17.485 14.644 16.787C14.541 16.534 14.2 15.518 14.742 14.141C14.742 14.141 15.58 13.873 17.488 15.165C18.284 14.944 19.136 14.833 19.983 14.829C20.83 14.833 21.682 14.944 22.48 15.165C24.386 13.873 25.222 14.141 25.222 14.141C25.766 15.518 25.425 16.534 25.322 16.787C25.962 17.485 26.348 18.377 26.348 19.467C26.348 23.303 24.011 24.148 21.785 24.395C22.144 24.704 22.463 25.312 22.463 26.244C22.463 27.579 22.451 28.657 22.451 28.981C22.451 29.25 22.631 29.566 23.138 29.468C27.108 28.161 29.97 24.416 29.97 20C29.97 14.477 25.493 10 20 10Z" fill="#F8FAFC"/>
            </g>
            <!-- LinkedIn -->
            <g class="social-icon" transform="translate(60, 0)">
                <circle cx="20" cy="20" r="20" fill="#1F2937" fill-opacity="0.5" stroke="rgba(255,255,255,0.05)"/>
                <path d="M15.45 13.125C16.2784 13.125 16.95 12.4534 16.95 11.625C16.95 10.7966 16.2784 10.125 15.45 10.125C14.6216 10.125 13.95 10.7966 13.95 11.625C13.95 12.4534 14.6216 13.125 15.45 13.125ZM13.95 14.625H16.95V24.375H13.95V14.625ZM21.95 14.625C20.15 14.625 19.15 15.6 18.7 16.275V14.625H15.7V24.375H18.7V19.275C18.7 17.925 18.95 16.65 20.6 16.65C22.25 16.65 22.3 18.225 22.3 19.35V24.375H25.3V18.675C25.3 15.9 24.7 14.625 21.95 14.625Z" fill="#F8FAFC"/>
            </g>
            <!-- X/Twitter -->
            <g class="social-icon" transform="translate(120, 0)">
                <circle cx="20" cy="20" r="20" fill="#1F2937" fill-opacity="0.5" stroke="rgba(255,255,255,0.05)"/>
                <path d="M22.57 16.741L27.915 11.25H26.651L21.955 16.082L18.248 11.25H14L19.605 18.49L14 24.25H15.264L20.223 19.149L24.128 24.25H28.376L22.569 16.741H22.57ZM20.866 18.487L20.299 17.671L15.722 11.085H17.663L21.37 16.42L21.937 17.236L26.652 24.019H24.711L20.866 18.488V18.487Z" fill="#F8FAFC"/>
            </g>
             <!-- Portfolio -->
            <g class="social-icon" transform="translate(180, 0)">
                <circle cx="20" cy="20" r="20" fill="#1F2937" fill-opacity="0.5" stroke="rgba(255,255,255,0.05)"/>
                <path d="M20 10C14.477 10 10 14.477 10 20C10 25.523 14.477 30 20 30C25.523 30 30 25.523 30 20C30 14.477 25.523 10 20 10ZM25.04 15.36L23.08 17.32C22.68 17.72 22.68 18.36 23.08 18.76C23.48 19.16 24.12 19.16 24.52 18.76L26.48 16.8C26.96 17.76 27.24 18.88 27.24 20C27.24 23.96 24.04 27.16 20.08 27.16C16.12 27.16 12.92 23.96 12.92 20C12.92 16.04 16.12 12.84 20.08 12.84C21.2 12.84 22.32 13.12 23.28 13.6L21.32 15.56C20.92 15.96 20.92 16.6 21.32 17C21.72 17.4 22.36 17.4 22.76 17L24.72 15.04C24.84 15.16 24.96 15.28 25.04 15.36Z" fill="#F8FAFC"/>
            </g>
        </g>
      </g>
    </g>
  </g>
  
  <!-- Final Glass Shine -->
  <rect x="0" y="0" width="1180" height="610" rx="24" stroke="white" stroke-opacity="0.03" stroke-width="1" pointer-events="none"/>
</svg>
